<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Banner Follow Stream Ninja</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

  :root {
    --crimson: #c81e2c;
    --crimson-deep: #5a0a12;
    --gold: #f0c14b;
    --gold-bright: #ffe27a;
    --bg-black: #07050a;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  .banner-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
  }

  .banner-track {
    position: relative;
    width: 100%;
    height: 96px;
    background: var(--bg-black);
    border-top: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    box-shadow:
      0 0 14px rgba(200, 30, 44, 0.5),
      0 0 26px rgba(240, 193, 75, 0.2);
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* ===== Teks kiri ===== */
  .text-area {
    position: relative;
    z-index: 6;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    height: 100%;
  }

  .text-area .icon-spark {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    animation: sparkPulse 1.6s ease-in-out infinite;
  }
  .text-area .icon-spark svg { width: 100%; height: 100%; }

  @keyframes sparkPulse {
    0%, 100% { opacity: 0.6; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .text-area h1 {
    margin: 0;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 26px;
    color: #fff;
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow:
      0 0 8px var(--crimson),
      0 0 18px rgba(200, 30, 44, 0.7),
      2px 2px 0 rgba(0,0,0,0.6);
    position: relative;
  }

  .text-area h1 .highlight {
    color: var(--gold-bright);
    text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(240,193,75,0.7);
  }

  /* Transisi ganti pesan: slash-wipe ala katana */
  .text-area h1.txt-out {
    animation: slashOut 0.35s ease-in forwards;
  }
  .text-area h1.txt-in {
    animation: slashIn 0.4s ease-out forwards;
  }

  @keyframes slashOut {
    0%   { opacity: 1; transform: translateX(0) skewX(0deg); filter: blur(0px); }
    100% { opacity: 0; transform: translateX(18px) skewX(-8deg); filter: blur(3px); }
  }
  @keyframes slashIn {
    0%   { opacity: 0; transform: translateX(-18px) skewX(8deg); filter: blur(3px); }
    100% { opacity: 1; transform: translateX(0) skewX(0deg); filter: blur(0px); }
  }

  /* Kilatan garis katana saat transisi */
  .slash-flash {
    position: absolute;
    left: 0;
    top: -10%;
    width: 3px;
    height: 120%;
    background: linear-gradient(180deg, transparent, var(--gold-bright), transparent);
    box-shadow: 0 0 10px var(--gold-bright);
    opacity: 0;
    pointer-events: none;
  }
  .slash-flash.active {
    animation: slashFlash 0.4s ease-out forwards;
  }
  @keyframes slashFlash {
    0%   { opacity: 0; left: -10px; transform: rotate(18deg); }
    40%  { opacity: 1; }
    100% { opacity: 0; left: 100%; transform: rotate(18deg); }
  }

  /* ===== Karakter kanan, blend ke hitam ===== */
  .char-area {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 46%;
    min-width: 220px;
    overflow: hidden;
    z-index: 3;
  }

  /* Fade mask kiri supaya karakter blend halus ke background */
  .char-fade {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: linear-gradient(90deg, var(--bg-black) 0%, rgba(7,5,10,0.85) 18%, rgba(7,5,10,0) 55%);
    pointer-events: none;
  }

  .char-figure {
    position: absolute;
    bottom: -6px;
    right: 6px;
    height: 112%;
    filter: drop-shadow(0 0 14px rgba(200,30,44,0.6));
    animation: figureSway 4s ease-in-out infinite;
  }
  .char-figure svg { height: 100%; display: block; }
  .char-figure video {
    height: 100%;
    width: auto;
    object-fit: contain;
    display: block;
  }

  @keyframes figureSway {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-3px) rotate(0.6deg); }
  }

  /* Kelopak/partikel jatuh */
  .petal {
    position: absolute;
    z-index: 4;
    width: 10px;
    height: 10px;
    background: linear-gradient(135deg, var(--crimson), var(--gold));
    border-radius: 2px 8px 2px 8px;
    opacity: 0.85;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-20%) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.85; }
    100% { transform: translateY(140%) translateX(-22px) rotate(380deg); opacity: 0; }
  }

  /* Garis asap tipis vertikal */
  .smoke {
    position: absolute;
    z-index: 4;
    bottom: 0;
    width: 60px;
    height: 100%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.05) 40%, transparent 80%);
    filter: blur(6px);
    animation: smokeDrift 6s ease-in-out infinite;
  }

  @keyframes smokeDrift {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50% { opacity: 0.55; transform: translateX(-10px); }
  }

  /* Sweep kilau melintas seluruh banner */
  .scanline {
    position: absolute;
    top: 0;
    left: -40%;
    width: 20%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,226,122,0.18), transparent);
    transform: skewX(-20deg);
    animation: sweep 5.5s ease-in-out infinite;
    pointer-events: none;
    z-index: 7;
  }

  @keyframes sweep {
    0%   { left: -40%; }
    100% { left: 130%; }
  }
</style>
</head>
<body>

  <div class="banner-wrap">
    <div class="banner-track">

      <div class="text-area">
        <div class="icon-spark">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2 L14 9 L21 9 L15.5 13.5 L17.5 21 L12 16.5 L6.5 21 L8.5 13.5 L3 9 L10 9 Z"
                  fill="#f0c14b" stroke="#ffe27a" stroke-width="0.6"/>
          </svg>
        </div>
        <h1 id="dynamicText">FOLLOW <span class="highlight">MY STREAM</span></h1>
        <div class="slash-flash" id="slashFlash"></div>
      </div>

      <div class="char-area" id="charArea">
        <div class="smoke" style="left:0;"></div>

        <!-- Slot video karakter — diisi otomatis lewat JS di bawah -->
        <video id="charVideo" class="char-figure" autoplay muted loop playsinline style="display:none;"></video>

        <!-- Placeholder kunoichi generik (tampil kalau charVideoUrl belum diisi) -->
        <div class="char-figure" id="charPlaceholder">
          <svg viewBox="0 0 220 380" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#8a0f1c"/>
                <stop offset="60%" stop-color="#5a0a12"/>
                <stop offset="100%" stop-color="#2a0408"/>
              </linearGradient>
              <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e8b89a"/>
                <stop offset="100%" stop-color="#c98f6e"/>
              </linearGradient>
              <linearGradient id="goldTrim" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#ffe27a"/>
                <stop offset="100%" stop-color="#c8941f"/>
              </linearGradient>
            </defs>

            <!-- Kipas perang besar di belakang (signature look) -->
            <g transform="translate(110,150) rotate(-12)">
              <path d="M0,0 C-70,-50 -110,-10 -120,40 C-60,30 -20,20 0,0 Z" fill="url(#cloak)" stroke="#f0c14b" stroke-width="2" opacity="0.92"/>
              <path d="M0,0 C70,-50 110,-10 120,40 C60,30 20,20 0,0 Z" fill="url(#cloak)" stroke="#f0c14b" stroke-width="2" opacity="0.92"/>
              <circle cx="0" cy="0" r="9" fill="url(#goldTrim)"/>
            </g>

            <!-- Rambut panjang terikat -->
            <path d="M95,70 C80,90 75,140 85,190 C90,210 95,230 88,250"
                  fill="none" stroke="#1c0f16" stroke-width="14" stroke-linecap="round" opacity="0.9"/>

            <!-- Tubuh / cloak -->
            <path d="M75,120 C70,160 65,220 70,290 C72,320 90,345 110,350
                     C130,345 148,320 150,290 C155,220 150,160 145,120
                     C130,100 90,100 75,120 Z"
                  fill="url(#cloak)" stroke="#1a0408" stroke-width="2"/>

            <!-- Trim emas di cloak -->
            <path d="M88,130 C86,180 84,230 90,280" fill="none" stroke="url(#goldTrim)" stroke-width="3" opacity="0.85"/>
            <path d="M132,130 C134,180 136,230 130,280" fill="none" stroke="url(#goldTrim)" stroke-width="3" opacity="0.85"/>

            <!-- Lengan -->
            <path d="M75,135 C55,150 45,175 50,200" fill="none" stroke="url(#cloak)" stroke-width="18" stroke-linecap="round"/>
            <path d="M145,135 C165,150 175,175 170,200" fill="none" stroke="url(#cloak)" stroke-width="18" stroke-linecap="round"/>

            <!-- Kepala -->
            <ellipse cx="110" cy="85" rx="26" ry="30" fill="url(#skin)"/>

            <!-- Rambut depan -->
            <path d="M84,75 C82,55 95,40 110,40 C125,40 138,55 136,75
                     C130,65 122,60 110,60 C98,60 90,65 84,75 Z"
                  fill="#1c0f16"/>

            <!-- Ikat kepala -->
            <path d="M84,72 C92,66 128,66 136,72" fill="none" stroke="url(#goldTrim)" stroke-width="4" stroke-linecap="round"/>

            <!-- Masker bawah wajah (khas ninja) -->
            <path d="M92,90 C98,102 122,102 128,90 C124,108 96,108 92,90 Z" fill="#3a0810" opacity="0.9"/>

            <!-- Mata -->
            <ellipse cx="100" cy="84" rx="3.2" ry="4" fill="#ffe27a"/>
            <ellipse cx="120" cy="84" rx="3.2" ry="4" fill="#ffe27a"/>
          </svg>
        </div>

        <div class="petal" style="left:18%; animation-duration:5.2s; animation-delay:0s;"></div>
        <div class="petal" style="left:38%; animation-duration:4.4s; animation-delay:1.1s; width:7px; height:7px;"></div>
        <div class="petal" style="left:58%; animation-duration:6s; animation-delay:2.3s;"></div>
        <div class="petal" style="left:72%; animation-duration:4.8s; animation-delay:0.6s; width:8px; height:8px;"></div>
        <div class="petal" style="left:30%; animation-duration:5.6s; animation-delay:3s;"></div>

        <div class="char-fade"></div>
      </div>

      <div class="scanline"></div>

    </div>
  </div>

  <script>
    // =========================================================
    // ISI LINK VIDEO HANABI / KARAKTER KAMU DI SINI.
    // Kosongkan ("") untuk tetap pakai siluet placeholder generik.
    // =========================================================
    const charVideoUrl = ""; // contoh: "https://raw.githubusercontent.com/USERNAME/REPO/main/hanabi.mp4"
    // =========================================================

    if (charVideoUrl) {
      const vid = document.getElementById('charVideo');
      vid.src = charVideoUrl;
      vid.style.display = 'block';
      document.getElementById('charPlaceholder').style.display = 'none';
      vid.play().catch(() => {
        document.addEventListener('click', () => vid.play());
      });
    }

    // =========================================================
    // PESAN YANG BERGANTIAN — tambah/ganti baris sesuai kebutuhan.
    // Pakai <span class="highlight">...</span> untuk sorot emas.
    // =========================================================
    const rotatingTexts = [
      'FOLLOW <span class="highlight">MY STREAM</span>',
      '<span class="highlight">SUPPORT</span> VIA LINK BIO',
      'JOIN THE <span class="highlight">SQUAD</span> NOW',
      'TAP <span class="highlight">FOLLOW</span> BEFORE YOU GO'
    ];
    const DURATION_PER_TEXT = 4000; // berapa lama (ms) tiap teks tampil sebelum ganti
    // =========================================================

    let textIndex = 0;
    const textEl = document.getElementById('dynamicText');
    const flashEl = document.getElementById('slashFlash');

    function rotateText() {
      textEl.classList.add('txt-out');
      flashEl.classList.add('active');

      setTimeout(() => {
        textIndex = (textIndex + 1) % rotatingTexts.length;
        textEl.innerHTML = rotatingTexts[textIndex];
        textEl.classList.remove('txt-out');
        textEl.classList.add('txt-in');

        setTimeout(() => {
          textEl.classList.remove('txt-in');
          flashEl.classList.remove('active');
        }, 420);
      }, 350);
    }

    setInterval(rotateText, DURATION_PER_TEXT);
  </script>

</body>
</html>
