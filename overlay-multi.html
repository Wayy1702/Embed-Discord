<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Video Overlay Multi</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent; /* ganti ke warna solid kalau tidak butuh transparan, misal: #000000 */
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* ganti ke "cover" kalau ingin video memenuhi penuh tanpa border */
    display: block;
  }

  #errorMsg {
    color: #ffffff;
    font-family: sans-serif;
    text-align: center;
    padding-top: 40%;
    font-size: 18px;
  }
</style>
</head>
<body>

  <video id="overlayVideo" autoplay muted loop playsinline></video>
  <div id="errorMsg" style="display:none;"></div>

  <script>
    // =========================================================
    // DAFTAR VIDEO — tambah/edit/hapus baris di bawah ini sesuai kebutuhan.
    // Key (kiri) = nama yang dipakai di parameter URL (?video=key)
    // Value (kanan) = link raw video kamu
    // =========================================================
    const videoList = {
      "video1": "https://raw.githubusercontent.com/Wayy1702/Embed-Discord/main/video1.mp4",
      "video2": "https://raw.githubusercontent.com/Wayy1702/Embed-Discord/main/hanabi.mp4",
      "video3": "GANTI_DENGAN_URL_VIDEO_3.mp4"
    };
    // =========================================================

    const params = new URLSearchParams(window.location.search);
    const key = params.get('video');
    const vid = document.getElementById('overlayVideo');
    const errorMsg = document.getElementById('errorMsg');

    if (key && videoList[key]) {
      vid.src = videoList[key];
      vid.play().catch(() => {
        document.addEventListener('click', () => vid.play());
      });
    } else {
      vid.style.display = 'none';
      errorMsg.style.display = 'block';
      errorMsg.textContent = key
        ? `Video dengan key "${key}" tidak ditemukan. Cek daftar videoList di file ini.`
        : `Tambahkan parameter ?video=KEY di URL. Contoh: ?video=video1`;
    }
  </script>

</body>
</html>
